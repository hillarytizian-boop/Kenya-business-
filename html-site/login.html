<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Business Hub Kenya</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page { padding-top: 80px; min-height: 100vh; background: var(--offWhite); display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border-radius: 24px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.08); }
        .auth-card .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
        .auth-card h2 { font-size: 24px; font-weight: 800; text-align: center; color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-card p { font-size: 14px; text-align: center; color: var(--inkMed); margin-bottom: 24px; }
        .auth-tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
        .auth-tabs button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; background: transparent; color: var(--inkMed); }
        .auth-tabs button.active { background: white; color: var(--green); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .auth-card input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; margin-bottom: 16px; }
        .auth-card input:focus { border-color: var(--green); outline: none; }
        .auth-card .btn-primary { width: 100%; padding: 14px; font-size: 15px; }
        .auth-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
        .auth-divider hr { flex: 1; border: none; height: 1px; background: var(--border); }
        .auth-divider span { font-size: 12px; color: var(--inkFaint); }
        .social-btn { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--inkMed); display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; margin-bottom: 8px; }
        .social-btn:hover { background: var(--surface); }
        .forgot-link { text-align: right; margin-top: -8px; margin-bottom: 16px; }
        .forgot-link a { font-size: 12px; color: var(--green); text-decoration: none; }
        @media (max-width: 768px) {
            .auth-card { padding: 24px; margin: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar"><!-- Same navbar --></nav>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">🇰🇪</div>
            <h2>Welcome Back</h2>
            <p>Sign in to access your dashboard</p>

            <div class="auth-tabs">
                <button class="active" onclick="switchTab('login')">Sign In</button>
                <button onclick="switchTab('register')">Register</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required minlength="8">
                <div class="forgot-link"><a href="#">Forgot password?</a></div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
                <input type="text" placeholder="Full Name" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Create a strong password" required minlength="8">
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="auth-divider"><hr><span>OR</span><hr></div>
            <button class="social-btn">📱 Continue with M-Pesa</button>
            <button class="social-btn">📧 Continue with Email</button>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
            if (tab === 'login') document.querySelector('.auth-tabs button:first-child').classList.add('active');
            else document.querySelector('.auth-tabs button:last-child').classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault();
            alert('✅ Login successful! Welcome back.');
            location.href = 'index.html';
        }

        function handleRegister(e) {
            e.preventDefault();
            alert('🎉 Account created successfully! Please verify your email.');
            location.href = 'index.html';
        }

        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }
    </script>
</body>
</html>
