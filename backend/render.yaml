services:
  - type: web
    name: business-hub-kenya-backend
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_PREFIX
        value: /api/v1
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@businesshubkenya.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://businesshubkenya.vercel.app,https://businesshubkenya.com
      
      # Database
      - key: DB_HOST
        fromDatabase:
          name: business-hub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: business-hub-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: business-hub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: business-hub-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: business-hub-db
          property: database
      - key: DB_SSL_MODE
        value: require
      
      # Redis
      - key: REDIS_HOST
        fromService:
          name: business-hub-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: business-hub-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: business-hub-redis
          type: redis
          property: password

  - type: redis
    name: business-hub-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render internal)

  - type: postgresql
    name: business-hub-db
    region: frankfurt
    plan: starter
    databaseName: business_hub_kenya
    postgresMajorVersion: 16
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render internal)
